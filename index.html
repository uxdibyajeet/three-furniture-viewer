<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/style.css">
    <title>three-furniture-viewer</title>
  </head>
  <body>
    <div id="app"></div>
    <!-- 2d interface -->
     <div class="appInterface">
        <header class="topBar">
          <span class="logo">Furniture<span class="bold">Visualization</span></span>
          <div id="toolTip" class="hidden">Click to view details</div>
          <button class="ctrlBtn">
            <img src="./public/icons/grip.svg" width="24" height="24">
            menu
          </button>
        </header>
        <div class="navControls">
          <div class="container">
            <button id="prevBtn" class="ctrlBtn"><img src="./public/icons/arrow-left.svg" width="24" height="24">Prev</button>
            <button id="nextBtn" class="ctrlBtn">Next <img src="./public/icons/arrow-right.svg" width="24" height="24"></button>
          </div>
        </div>
        <!-- modal -->
         <div class="modal hidden">
          <div class="content">
            <button id="closeModal">x</button>
            <h2 class="modelTitle">Product Title</h2>
            <p class="modelDesc">Details goes here...</p>
            <ul id="modelSpecs"></ul>
          </div>
         </div>
     </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
